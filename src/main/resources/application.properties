spring.application.name=recrutationtask

# Disable the embedded web server. This is a CLI application
spring.main.web-application-type=none

# JSONPlaceholder base URL
post.api.base-url=https://jsonplaceholder.typicode.com

# Directory where individual post JSON files will be written
post.export.directory=posts
# Maximum number of copies allowed when a file already exists (e.g. 1.json -> 1_1.json ... 1_5.json)
post.export.max-copies=5
